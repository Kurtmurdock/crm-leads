<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM Leads — Salinas &amp; Atlântica</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-badge">M</div>
      <div class="brand-text">CRM Leads<span>Salinas &amp; Atlântica</span></div>
    </div>

    <nav class="nav" id="navList">
      <a class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 13h4v8H3zM10 9h4v12h-4zM17 4h4v17h-4z"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-view="kanban">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="1.5"/><path d="M9 4v16M15 4v16"/></svg>
        Kanban
      </a>
      <a class="nav-item" data-view="contatos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="1.5"/><path d="M3 9h18M8 14h4"/></svg>
        Contatos
      </a>
      <a class="nav-item" data-view="agendamentos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="1.5"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        Agendamentos
      </a>
      <a class="nav-item" data-view="metricas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V9M11 19V4M18 19v-7"/></svg>
        Métricas
      </a>
      <div class="nav-sep"></div>
      <a class="nav-item" data-view="equipe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c1-4 3.5-6 6.5-6s5.5 2 6.5 6M16 9a3 3 0 100-6M22 20c-.6-2.6-2-4.5-4-5.4"/></svg>
        Equipe
      </a>
      <a class="nav-item" data-view="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3.9a8 8 0 00-1.8-1L15 3h-4l-.3 2.9a8 8 0 00-1.8 1l-2.3-.9-2 3.4L6.6 11a7.9 7.9 0 000 2l-2 1.6 2 3.4 2.3-.9a8 8 0 001.8 1L11 21h4l.3-2.9a8 8 0 001.8-1l2.3.9 2-3.4z"/></svg>
        Configuração Meta
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="nav-sep"></div>
      <div class="who">
        <div class="who-avatar" id="whoAvatar">?</div>
        <div>
          <div class="who-name" id="whoName">—</div>
          <div class="who-role" id="whoRole">—</div>
        </div>
      </div>
      <a class="nav-item" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Sair
      </a>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="menu-btn" id="menuBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div>
          <h1 id="viewTitle">Dashboard</h1>
          <div class="sub" id="viewSub">Visão geral do funil de leads</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="loja-switch" id="lojaSwitch"></div>
        <div class="live-dot off" id="liveDot"><div class="dot"></div><span id="liveLabel">conectando</span></div>
      </div>
    </div>

    <div class="view" id="viewDashboard"></div>
    <div class="view hidden" id="viewKanban"></div>
    <div class="view hidden" id="viewContatos"></div>
    <div class="view hidden" id="viewAgendamentos"></div>
    <div class="view hidden" id="viewMetricas"></div>
    <div class="view hidden" id="viewEquipe"></div>
    <div class="view hidden" id="viewConfig"></div>
  </div>
</div>

<div id="drawerRoot"></div>
<div id="modalRoot"></div>
<div class="toast-stack" id="toastStack"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
